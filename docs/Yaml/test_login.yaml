-
  module: 登录
  api: /login
  status: normal
  caseid: login-api-001
  autoid: login_auto_api_001
  testcase: 所有数据都填写，填写正确账号密码，code，uuid任意值
  request:
    method: post
    url: "http://example.wildgugugu.cn:8080/login"
    headers:
      "Content-Type": "application/json"
    params:
    raw:
    data:
        "username": "admin"
        "password": "admin123"
        "code": "stri种ng"
        "uuid": "strinAg"
  assert:
    "status_code": 200
    "msg": "操作成功"
    "code": 200

